<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: teal;
            padding: 5px;
            display: flex;
            flex-direction: row;
            justify-content: left;
            height: 100%;
        }
        header ul li {
            list-style: none;
            color: white;
            font-size: 20px;
            margin: 0 10px;
        }
        header ul {
            display: flex;
            margin: 20px;
        }
        header a {
            text-decoration: none;
            color: white;
        }
        header a:hover {
            color: rgb(139, 137, 137);
            transition: all 0.3s;
        }
        body {
            display: flex;
            justify-content: center;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }
        main {
            margin: auto;
            margin-top: 300px;
        }
        #form-reg {
            border: 1px solid teal;
            padding: 30px;
            border-radius: 10px;
        }
        #form-reg div {
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
            width: 300px;
        }
        #form-reg input {
            padding: 5px;

        }
        #form-reg button {
            background-color: none;
            border: 1px solid teal;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
        }
        #form-reg button:hover {
            transform: scale(1.1);
            transition: all 0.2s;
        }
    </style>
</head>
<body>
    <header>
        <ul>
            <li><a href="user.html">Личный кабинет</a></li>
            <li><a href="registr.html">Регистрация</a></li>
            <li><a href="auth.html">Войти</a></li>
        </ul>
    </header>
</body>
</html>
